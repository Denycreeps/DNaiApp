name: dnaiapp
description: "My NovelAi image generate third-party app."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.6.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.5.4
  permission_handler: ^11.3.0
  archive: ^3.4.10
  
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  provider: ^6.1.5+1
  file_picker: ^10.3.10
  change_app_package_name: ^1.5.0
  media_scanner: ^2.2.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  flutter_background: ^1.3.1
  image_picker: ^1.2.1
  image: ^4.3.0
  package_info_plus: ^8.3.0

  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/tags.json

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"